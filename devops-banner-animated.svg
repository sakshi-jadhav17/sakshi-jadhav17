<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <style>
      .wave { animation: wave-animation 5s infinite linear; }
      @keyframes wave-animation { 
        0% { transform: translateX(0); } 
        100% { transform: translateX(-100%); } 
      }
      .background { fill: #1a1a1a; }
      .text { font-family: 'Arial', sans-serif; font-size: 48px; fill: white; }
    </style>
  </defs>
  <rect class="background" width="100%" height="100%" />
  <text class="text" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle">Sakshi Jadhav</text>
  <g class="wave">
    <path d="M0,100 C150,0 350,200 500,100 C650,0 850,200 1000,100 L1000,200 L0,200 Z" fill="rgba(255, 255, 255, 0.1)" />
  </g>
</svg>